[config]
version_check = false
caching = true

expr_prefix = "{{"
expr_postfix = "}}"

block_prefix = "<*"
block_postfix = "*>"

[templates.preview]
input_path = '~/dotfiles/matugen/templates/preview.html.tpl'
output_path = '~/dotfiles/matugen/preview.html'

[templates.btop]
input_path = '~/dotfiles/matugen/templates/btop.theme.tpl'
output_path = '~/dotfiles/btop/themes/matugen.theme'

[templates.gtk3]
input_path = '~/dotfiles/matugen/templates/gtk-colors.css.tpl'
output_path = '~/dotfiles/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path = '~/dotfiles/matugen/templates/gtk-colors.css.tpl'
output_path = '~/dotfiles/gtk-4.0/colors.css'
post_hook = '~/dotfiles/scripts/gtk-reload.sh'

[templates.hyprland]
input_path = '~/dotfiles/matugen/templates/hyprland.lua.tpl'
output_path = '~/dotfiles/hypr/modules/colors.lua'

# [templates.hyprtoolkit]
# input_path = '~/dotfiles/matugen/templates/hyprtoolkit.conf'
# output_path = '~/dotfiles/hypr/hyprtoolkit.conf'

[templates.kitty]
input_path = '~/dotfiles/matugen/templates/kitty.conf.tpl'
output_path = '~/dotfiles/kitty/colors.conf'

[templates.lazygit]
input_path = '~/dotfiles/matugen/templates/lazygit.yml.tpl'
output_path = '~/dotfiles/lazygit/config.yml'

[templates.niri]
input_path = '~/dotfiles/matugen/templates/niri.kdl.tpl'
output_path = '~/dotfiles/niri/modules/colors.kdl'

[templates.quickshell]
input_path = '~/dotfiles/matugen/templates/quickshell.json.tpl'
output_path = '~/dotfiles/quickshell/colors.json'

