# Application
$terminal = kitty
$fileManager = pkill -x thunar || thunar
$browser = zen-browser
$scripts = $HOME/dotfiles/scripts

# @see https://wiki.hypr.land/Configuring/Keywords
# @see https://wiki.hypr.land/Configuring/Binds/

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, A, exec, quickshell ipc call startMenu toggle
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, exec, $terminal
# bind = $mainMod, C, exec, hyprpicker -a -f hex -l | xargs -I {} notify-send "Color {} copied to clipboard"
bind = $mainMod, Q, killactive
# bind = $mainMod, D, exec, ~/dotfiles/scripts/show-desktop.sh

bind = $mainMod, SPACE, exec, pkill rofi || $scripts/rofilaunch.sh --drun
bind = $mainMod SHIFT, B, exec, quickshell ipc call bar toggle
# bind = $mainMod, X, exec, pkill rofi || $scripts/rofilaunch.sh --menu
# bind = $mainMod, R, exec, pkill rofi || $scripts/rofilaunch.sh --window
# bind = $mainMod, G, exec, pkill rofi || $scripts/web-search.sh
# bind = $mainMod, V, exec, pkill rofi || cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy -n
bind = $mainMod, V, exec, quickshell ipc call clipboardManager toggle

bind = $mainMod, F, togglefloating
bind = $mainMod SHIFT, F, fullscreen

bind = $mainMod, O, pseudo, # dwindle
bind = $mainMod SHIFT, O, togglesplit, # dwindle

# Screenshot with mainMod + S or SHIFT + S
bindl = $mainMod, S, exec, $scripts/screenshot.sh --mode region
bindl = $mainMod SHIFT, S, exec, $scripts/screenshot.sh --mode fullscreen
bindl = $mainMod CTRL,  S, exec, $scripts/screenshot.sh --mode window

# Move focus layout with mainMod + hjkl
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move active window to a direction with mainMod + CTRL + hjkl
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize active window with mainMod + CTRL + SHIFT + hjkl
bindel = $mainMod CTRL, H, resizeactive, 10 0
bindel = $mainMod CTRL, L, resizeactive, -10 0
bindel = $mainMod CTRL, K, resizeactive, 0 10
bindel = $mainMod CTRL, J, resizeactive, 0 -10

# Cycle active window in monocle layout with mainMod + , and .
bind = $mainMod, PERIOD, layoutmsg, cyclenext
bind = $mainMod, COMMA,  layoutmsg, cycleprev

# Cycle active window in scrolling layout with mainMod + [ and ]
bind = $mainMod, BRACKETRIGHT, layoutmsg, move +col
bind = $mainMod, BRACKETLEFT,  layoutmsg, move -col

# Swap columns in scrolling layout with mainMod + SHIFT + [ and ]
bind = $mainMod SHIFT, BRACKETRIGHT, layoutmsg, swapcol r
bind = $mainMod SHIFT, BRACKETLEFT,  layoutmsg, swapcol l

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# Switch workspaces with gestures (3-finger swipe left/right)
gesture = 3, horizontal, workspace

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, M, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, MOUSE_DOWN, workspace, e+1
bind = $mainMod, MOUSE_UP, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, MOUSE:272, movewindow
bindm = $mainMod, MOUSE:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

