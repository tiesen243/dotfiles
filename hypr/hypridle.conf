################
###   IDLE   ###
################
# See https://wiki.hyprland.org/Hypr-Ecosystem/hypridle

general {
  lock_cmd         = quickshell ipc call lockscreen lock
  before_sleep_cmd = loginctl lock-session                      # lock before suspend.
  after_sleep_cmd  = hyprctl dispatch "hl.dsp.dpms(false)"      # to avoid having to press a key twice to turn on the display.
}

listener {
  timeout          = 150                                        # 2.5min.
  on-timeout       = brightnessctl -s set 10                    # set monitor backlight to minimum, avoid 0 on OLED monitor.
  on-resume        = brightnessctl -r                           # monitor backlight restore.
}

listener {
  timeout          = 300                                        # 5min
  on-timeout       = loginctl lock-session                      # lock screen when timeout has passed
}

listener {
  timeout          = 600                                        # 10min
  on-timeout       = hyprctl dispatch "hl.dsp.dpms(false)"      # screen off when timeout has passed
  on-resume        = hyprctl dispatch "hl.dsp.dpms(true)"       # screen on when activity is detected after timeout has fired.
}

